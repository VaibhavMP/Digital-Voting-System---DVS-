<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Smart Voting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('{{ url_for("static", filename="images/hero image in smart voting system.avif") }}') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.85) 0%, rgba(59, 130, 246, 0.7) 100%);
            z-index: 0;
        }

        .profile-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 420px;
            text-align: center;
        }

        /* User Photo Circle */
        .user-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            color: white;
            border: 4px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .user-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        h2 {
            color: #1e3a8a;
            margin-bottom: 5px;
            font-size: 28px;
        }

        .user-id {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .info {
            text-align: left;
            margin-top: 20px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }

        .row {
            margin: 15px 0;
            font-size: 15px;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .row:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 600;
            color: #333;
        }

        .value {
            color: #555;
            text-align: right;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .logout-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .edit-btn {
            display: inline-block;
            margin-top: 25px;
            margin-left: 10px;
            padding: 12px 30px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .edit-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <!-- User Photo Circle -->
        <div class="user-photo">
            {% if user_face_exists %}
            <img src="{{ url_for('static', filename='data/' ~ user_id ~ '/face.png') }}" alt="Profile Photo">
            {% else %}
            👤
            {% endif %}
        </div>

        <h2>{{ user['name'] }}</h2>
        <p class="user-id">Voter ID: {{ user['voterid'] }}</p>

        <div class="info">
            <div class="row">
                <span class="label">Aadhaar</span>
                <span class="value">{{ user['aadhaar'][:4] }}********</span>
            </div>

            <div class="row">
                <span class="label">Email</span>
                <span class="value">{{ user['email'] }}</span>
            </div>

            <div class="row">
                <span class="label">Phone</span>
                <span class="value">{{ user['mobile'] }}</span>
            </div>

            <div class="row">
                <span class="label">Voting Status</span>
                <span class="value">
                    {% if user['has_voted'] == 1 %}
                        <span class="badge badge-success">Voted ✓</span>
                    {% else %}
                        <span class="badge badge-warning">Not Voted</span>
                    {% endif %}
                </span>
            </div>
        </div>

        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </div>
</body>
</html>
