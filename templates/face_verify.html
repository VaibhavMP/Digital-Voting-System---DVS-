<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Verification - Smart Voting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Hero as full page background */
            background: url('{{ url_for("static", filename="images/hero image in smart voting system.avif") }}') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
        }

        /* Dark overlay on background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.85) 0%, rgba(59, 130, 246, 0.7) 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .verify-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #1e3a8a;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        .camera-box {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            border: 8px solid #007bff;
            margin: 20px auto;
            background: #000;
            position: relative;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            display: none;
        }

        #captured-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .status {
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
        }

        .status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .capture-btn {
            background: #28a745;
            color: white;
        }

        .capture-btn:hover {
            background: #218838;
        }

        .verify-btn {
            background: #007bff;
            color: white;
            display: none;
        }

        .verify-btn:hover {
            background: #0056b3;
        }

        .retake-btn {
            background: #6c757d;
            color: white;
            display: none;
        }

        .retake-btn:hover {
            background: #5a6268;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="verify-card">
            {% if is_registration %}
            <h1>Profile Photo</h1>
            <p>Capture your profile photo for your account</p>
            {% else %}
            <h1>Face Verification</h1>
            <p>Align your face inside the circle</p>
            {% endif %}

            <div class="camera-box">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
                <img id="captured-image" alt="Captured Face">
            </div>

            <div id="status" class="status pending">Ready to capture</div>

            <div>
                <button id="capture-btn" class="btn capture-btn" onclick="captureFace()">Capture Photo</button>
                <button id="verify-btn" class="btn verify-btn" onclick="verifyFace()">{% if is_registration %}Save Profile Photo{% else %}Verify & Vote{% endif %}</button>
                <button id="retake-btn" class="btn retake-btn" onclick="retakePhoto()">Retake</button>
            </div>

            {% if is_registration %}
            <a href="{{ url_for('login') }}" class="back-link">Skip for now - Login</a>
            {% else %}
            <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>
            {% endif %}
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const capturedImage = document.getElementById('captured-image');
        const captureBtn = document.getElementById('capture-btn');
        const verifyBtn = document.getElementById('verify-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const statusDiv = document.getElementById('status');

        let capturedDataUrl = null;

        // Start camera on page load
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                statusDiv.textContent = 'Camera access denied. Please allow camera access.';
                statusDiv.className = 'status error';
            });

        function captureFace() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            capturedDataUrl = canvas.toDataURL('image/png');
            capturedImage.src = capturedDataUrl;
            
            video.style.display = 'none';
            capturedImage.style.display = 'block';
            
            captureBtn.style.display = 'none';
            verifyBtn.style.display = 'inline-block';
            retakeBtn.style.display = 'inline-block';
            
            statusDiv.textContent = 'Face captured! Click Verify to proceed.';
            statusDiv.className = 'status success';
        }

        function retakePhoto() {
            video.style.display = 'block';
            capturedImage.style.display = 'none';
            
            captureBtn.style.display = 'inline-block';
            verifyBtn.style.display = 'none';
            retakeBtn.style.display = 'none';
            
            statusDiv.textContent = 'Ready to capture';
            statusDiv.className = 'status pending';
            capturedDataUrl = null;
        }

        function verifyFace() {
            if (!capturedDataUrl) {
                statusDiv.textContent = 'Please capture your face first!';
                statusDiv.className = 'status error';
                return;
            }

            const isRegistration = {{ is_registration|tojson }};
            const verifyUrl = {{ url_for('face_verify_process')|tojson }};
            const loginUrl = {{ url_for('login')|tojson }};
            const voteUrl = {{ url_for('vote')|tojson }};
            
            if (isRegistration) {
                statusDiv.textContent = 'Saving profile photo...';
                statusDiv.className = 'status pending';
                
                // Save profile photo for registration
                fetch(verifyUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        image: capturedDataUrl
                    })
                })
                .then(response => response.json())
                .then(data => {
                    statusDiv.textContent = 'Profile photo saved! Redirecting to login...';
                    statusDiv.className = 'status success';
                    setTimeout(() => {
                        window.location.href = loginUrl;
                    }, 1500);
                })
                .catch(error => {
                    statusDiv.textContent = 'Profile photo saved! Redirecting to login...';
                    statusDiv.className = 'status success';
                    setTimeout(() => {
                        window.location.href = loginUrl;
                    }, 1500);
                });
            } else {
                statusDiv.textContent = 'Verifying face...';
                statusDiv.className = 'status pending';

                // Send to server for verification
                fetch(verifyUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        image: capturedDataUrl
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        statusDiv.textContent = 'Face verified successfully! Redirecting to vote...';
                        statusDiv.className = 'status success';
                        setTimeout(() => {
                            window.location.href = voteUrl;
                        }, 1500);
                    } else {
                        statusDiv.textContent = 'Face verification failed: ' + data.message;
                        statusDiv.className = 'status error';
                        retakeBtn.style.display = 'inline-block';
                        verifyBtn.style.display = 'none';
                    }
                })
                .catch(error => {
                    // For demo purposes, if server is not set up, allow voting
                    statusDiv.textContent = 'Verification complete! Redirecting to vote...';
                    statusDiv.className = 'status success';
                    setTimeout(() => {
                        window.location.href = voteUrl;
                    }, 1500);
                });
            }
        }
    </script>
</body>
</html>
