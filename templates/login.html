<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Voting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('{{ url_for("static", filename="images/hero image in smart voting system.avif") }}') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.85) 0%, rgba(59, 130, 246, 0.7) 100%);
            z-index: 0;
        }

        .form-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 400px;
            margin: auto;
        }

        .form-card h2 {
            color: #1e1e3f;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-card > p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-card form {
            text-align: left;
        }

        .form-card label {
            display: block;
            color: #374151;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            margin-top: 15px;
        }

        .form-card input[type="text"],
        .form-card input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-card input:focus {
            outline: none;
            border-color: #7b83ff;
            box-shadow: 0 0 0 3px rgba(123, 131, 255, 0.2);
        }

        .next-btn {
            background-color: #7b83ff;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            margin-top: 25px;
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            background-color: #6366f1;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .toggle-text a {
            color: #7b83ff;
            font-weight: 600;
            text-decoration: none;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .powered-by {
            display: block;
            margin-top: 20px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Login</h2>
        <p>Access your voting account</p>
        
        <form action="/login" method="POST">
            <label>Voter ID or Aadhaar</label>
            <input type="text" name="voterid" placeholder="Enter Voter ID or Aadhaar" required>
            
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password" required>
            
            <button type="submit" class="next-btn">Login</button>
        </form>
        
        <div class="toggle-text">
            New User? <a href="{{ url_for('signup') }}">Register Here</a>
        </div>
        
        <span class="powered-by">Smart Voting System</span>
    </div>
</body>
</html>
