<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Smart Voting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('{{ url_for("static", filename="images/hero image in smart voting system.avif") }}') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.85) 0%, rgba(59, 130, 246, 0.7) 100%);
            z-index: 0;
        }

        .form-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 450px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-card h2 {
            color: #1e1e3f;
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-card > p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-card form {
            text-align: left;
        }

        .form-card label {
            display: block;
            color: #374151;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            margin-top: 10px;
        }

        .form-card input[type="text"],
        .form-card input[type="email"],
        .form-card input[type="password"],
        .form-card input[type="date"],
        .form-card select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-card input:focus,
        .form-card select:focus {
            outline: none;
            border-color: #7b83ff;
            box-shadow: 0 0 0 3px rgba(123, 131, 255, 0.2);
        }

        .next-btn {
            background-color: #7b83ff;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            background-color: #6366f1;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .toggle-text {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .toggle-text a {
            color: #7b83ff;
            font-weight: 600;
            text-decoration: none;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .powered-by {
            display: block;
            margin-top: 15px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Register Now</h2>
        <p>Create your voting account</p>
        
        <form action="/signup" method="POST">
            <label>Name</label>
            <input type="text" name="name" placeholder="Full Name" required>
            
            <label>Date of Birth</label>
            <input type="date" name="dob" required>
            
            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
            
            <label>Aadhaar Number</label>
            <input type="text" name="aadhaar" placeholder="12-digit Aadhaar" maxlength="12" required>
            
            <label>Voter ID</label>
            <input type="text" name="voterid" placeholder="Voter ID Number" required>
            
            <label>Mobile Number</label>
            <input type="text" name="mobile" placeholder="10-digit Mobile" maxlength="10" required>
            
            <label>Email Address</label>
            <input type="email" name="email" placeholder="your@email.com" required>
            
            <label>Address</label>
            <input type="text" name="address" placeholder="Your Address" required>
            
            <label>Country</label>
            <input type="text" name="country" placeholder="Country" value="India" required>
            
            <label>Create Password</label>
            <input type="password" name="password" placeholder="Password (min 6 characters)" required>
            
            <button type="submit" class="next-btn">Register</button>
        </form>
        
        <div class="toggle-text">
            Already have an account? <a href="{{ url_for('login') }}">Login Here</a>
        </div>
        
        <span class="powered-by">Smart Voting System</span>
    </div>
</body>
</html>
