<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Voting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Hero as full page background */
            background: url('{{ url_for("static", filename="images/hero image in smart voting system.avif") }}') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
        }

        /* Dark overlay on background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.85) 0%, rgba(59, 130, 246, 0.7) 100%);
            z-index: 0;
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Logo in Center */
        .logo-center {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-center img {
            width: 150px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 3px solid white;
        }

        /* Title */
        .title {
            color: white;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
        }

        .welcome {
            background: rgba(255,255,255,0.2);
            padding: 10px 25px;
            border-radius: 10px;
            color: white;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            padding: 20px 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            border-color: #667eea;
        }

        .icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        .title-card {
            font-size: 14px;
            font-weight: bold;
            color: #1e3a8a;
            display: block;
        }

        .description {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            display: block;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding-top: 30px;
            text-align: center;
            color: white;
            opacity: 0.8;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo in Center -->
        <div class="logo-center">
            <img src="{{ url_for('static', filename='images/logo for indian voting system.jpg') }}" alt="Logo">
        </div>

        <h1 class="title">Smart Voting System</h1>
        <p class="subtitle">Secure • Transparent • Digital</p>
        
        <div class="welcome">
            Welcome to your voting dashboard
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid">
            <a href="{{ url_for('face_verify') }}" class="card">
                <span class="icon">📷</span>
                <span class="title-card">Face Verification</span>
                <span class="description">Verify your identity</span>
            </a>

            <a href="{{ url_for('vote') }}" class="card">
                <span class="icon">🗳️</span>
                <span class="title-card">Vote Now</span>
                <span class="description">Cast your vote</span>
            </a>

            <a href="{{ url_for('results') }}" class="card">
                <span class="icon">📊</span>
                <span class="title-card">View Results</span>
                <span class="description">See live results</span>
            </a>

            <a href="{{ url_for('profile') }}" class="card">
                <span class="icon">👤</span>
                <span class="title-card">My Profile</span>
                <span class="description">View your info</span>
            </a>
        </div>

        <div class="footer">
            <p>India Smart Voting System © 2026</p>
        </div>
    </div>
</body>
</html>
