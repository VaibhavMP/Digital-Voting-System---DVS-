<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Voting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('{{ url_for("static", filename="images/hero image in smart voting system.avif") }}') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.85) 0%, rgba(59, 130, 246, 0.7) 100%);
            z-index: 0;
        }

        .splash-container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .logo-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .splash-title {
            color: white;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .splash-subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-circle">
            <img src="{{ url_for('static', filename='images/logo for indian voting system.jpg') }}" alt="Logo">
        </div>
        <h1 class="splash-title">Smart Election Voting</h1>
        <p class="splash-subtitle">Secure • Transparent • Digital</p>
    </div>

    <script>
        setTimeout(function(){
            window.location.href = "{{ url_for('home') }}";
        },3000);

    </script>
</body>
</html>
