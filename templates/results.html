<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Smart Voting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('{{ url_for("static", filename="images/hero image in smart voting system.avif") }}') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.85) 0%, rgba(59, 130, 246, 0.7) 100%);
            z-index: 0;
        }

        .results-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 25px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .party-info {
            flex: 1;
        }

        .party-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .votes {
            font-size: 24px;
            font-weight: bold;
            color: #1e3a8a;
            margin-left: 20px;
        }

        .bar-container {
            width: 100%;
            background: #eee;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .bar {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            transition: width 0.5s ease;
        }

        .total {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .back-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="results-card">
        <h1>Voting Results</h1>

        {% for result in results %}
        <div class="result-item">
            <div class="party-info">
                <div class="party-name">{{ result['name'] }} ({{ result['party'] }})</div>
                <div class="bar-container">
                    <div class="bar" id="bar-{{ loop.index }}"></div>
                </div>
            </div>
            <div class="votes">{{ result['votes'] }}</div>
        </div>
        <script>
            var percent = {{ result['votes']|tojson }};
            var total = {{ total_votes|tojson }};
            var width = total > 0 ? (percent / total * 100) : 0;
            var barElement = document.getElementById('bar-' + '{{ loop.index }}');
            if (barElement) {
                barElement.style.width = width + '%';
            }
        </script>
        {% endfor %}

        <div class="total">Total Votes: {{ total_votes }}</div>

        <div style="text-align: center;">
            <a href="{{ url_for('dashboard') }}" class="back-btn">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
