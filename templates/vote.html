<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - Smart Voting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('{{ url_for("static", filename="images/hero image in smart voting system.avif") }}') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.85) 0%, rgba(59, 130, 246, 0.7) 100%);
            z-index: 0;
        }

        .vote-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 500px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #1e3a8a;
        }

        .candidate {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .party-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .candidate form {
            display: inline;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            background: #28a745;
            color: white;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="vote-card">
        <h1>Select Candidate</h1>

        <div class="candidate">
            <div class="party-name">Bharatiya Janata Party (BJP)</div>
            <form action="{{ url_for('vote') }}" method="POST">
                <input type="hidden" name="candidate" value="BJP">
                <button type="submit" class="btn">Vote</button>
            </form>
        </div>

        <div class="candidate">
            <div class="party-name">Indian National Congress (INC)</div>
            <form action="{{ url_for('vote') }}" method="POST">
                <input type="hidden" name="candidate" value="INC">
                <button type="submit" class="btn">Vote</button>
            </form>
        </div>

        <div class="candidate">
            <div class="party-name">Bahujan Samaj Party (BSP)</div>
            <form action="{{ url_for('vote') }}" method="POST">
                <input type="hidden" name="candidate" value="BSP">
                <button type="submit" class="btn">Vote</button>
            </form>
        </div>

        <div class="candidate">
            <div class="party-name">Communist Party of India (Marxist)</div>
            <form action="{{ url_for('vote') }}" method="POST">
                <input type="hidden" name="candidate" value="CPIM">
                <button type="submit" class="btn">Vote</button>
            </form>
        </div>

        <div class="candidate">
            <div class="party-name">Aam Aadmi Party (AAP)</div>
            <form action="{{ url_for('vote') }}" method="POST">
                <input type="hidden" name="candidate" value="AAP">
                <button type="submit" class="btn">Vote</button>
            </form>
        </div>

        <div class="candidate">
            <div class="party-name">National People's Party (NPP)</div>
            <form action="{{ url_for('vote') }}" method="POST">
                <input type="hidden" name="candidate" value="NPP">
                <button type="submit" class="btn">Vote</button>
            </form>
        </div>
    </div>
</body>
</html>
